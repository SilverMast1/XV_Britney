<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmados — XV Britney</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 50%, #e0f7fa 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            width: 100%;
            max-width: 800px;
        }

        header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #0097a7;
            text-shadow: 0 2px 10px rgba(0, 151, 167, 0.2);
        }

        header p {
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: #00838f;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* ---- Botón Volver ---- */
        .btn-volver {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            border: 2px solid #b2ebf2;
            padding: 10px 20px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            color: #0097a7;
            box-shadow: 0 4px 12px rgba(0, 151, 167, 0.1);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-volver:hover {
            background: #e0f7fa;
            border-color: #0097a7;
            transform: translateY(-50%) scale(1.03);
        }

        /* ---- Tarjetas de resumen ---- */
        .resumen-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
        }

        .card-resumen {
            background: white;
            border-radius: 20px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 151, 167, 0.1);
            border-top: 5px solid #0097a7;
        }

        .card-resumen:nth-child(2) {
            border-top-color: #2e7d32;
        }

        .card-resumen h3 {
            font-size: 0.72rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 10px;
        }

        .card-resumen .valor {
            font-size: 2.8rem;
            font-weight: 700;
            color: #006064;
            font-family: 'Montserrat', sans-serif;
        }

        .card-resumen:nth-child(2) .valor {
            color: #2e7d32;
        }

        /* ---- Panel / Tabla ---- */
        .panel-tabla {
            background: white;
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 50px rgba(0, 151, 167, 0.12);
            border-top: 6px solid #0097a7;
        }

        .panel-tabla h2 {
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #0097a7;
            margin-bottom: 25px;
            text-align: center;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        th {
            background-color: #f0fdff;
            color: #00838f;
            text-transform: uppercase;
            font-size: 0.72rem;
            letter-spacing: 1.5px;
            font-weight: 700;
            padding: 14px 16px;
            border-bottom: 2px solid #b2ebf2;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #e0f7fa;
            color: #334155;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #fcfdfe;
        }

        .nombre-familia {
            font-weight: 700;
            color: #006064;
        }

        .badge-pases {
            display: inline-block;
            background: #e0f7fa;
            color: #00838f;
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .btn-ver-invitacion {
            display: inline-block;
            padding: 6px 12px;
            background: #f0fdff;
            border: 1px solid #4dd0e1;
            color: #0097a7;
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.2s;
        }

        .btn-ver-invitacion:hover {
            background: #0097a7;
            color: white;
            transform: translateY(-1px);
        }

        .sin-datos {
            text-align: center;
            color: #64748b;
            padding: 40px 20px;
            font-style: italic;
        }

        .sync-badge {
            display: inline-block;
            font-size: 0.6rem;
            letter-spacing: 1px;
            padding: 3px 10px;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .sync-badge.local {
            background: #e0f7fa;
            color: #0097a7;
        }

        .sync-badge.cloud {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .sync-loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(0, 151, 167, 0.2);
            border-radius: 50%;
            border-top-color: #0097a7;
            animation: spin 0.8s infinite linear;
            margin-left: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 600px) {
            .btn-volver {
                position: static;
                transform: none;
                margin-bottom: 20px;
                display: inline-flex;
            }

            header {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .resumen-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .panel-tabla {
                padding: 20px 15px;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="admin.html" class="btn-volver">← Panel Admin</a>
        <h1>Familias Confirmadas</h1>
        <p>XV Años · Britney</p>
        <div id="sync-status-badge" class="sync-badge local">Modo Local</div>
    </header>

    <!-- Resumen -->
    <div class="resumen-container">
        <div class="card-resumen">
            <h3>Familias Confirmadas</h3>
            <div class="valor" id="total-familias">0</div>
        </div>
        <div class="card-resumen">
            <h3>Pases Confirmados</h3>
            <div class="valor" id="total-pases">0</div>
        </div>
    </div>

    <!-- Tabla -->
    <div class="panel-tabla">
        <h2>✦ Lista de Confirmaciones ✦</h2>
        <div class="table-responsive">
            <table id="tabla-confirmados">
                <thead>
                    <tr>
                        <th>Familia</th>
                        <th>Pases Confirmados</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="lista-cuerpo">
                    <tr>
                        <td colspan="3" class="sin-datos">Cargando confirmaciones...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let API_URL = localStorage.getItem('xv_api_url');
        // Si no hay configuración o estaba apuntando a Google Apps Script, forzar que use SheetDB
        if (API_URL === null || API_URL.includes('script.google.com')) {
            API_URL = 'https://sheetdb.io/api/v1/iszy6pglqu7be';
        }

        let invitados = JSON.parse(localStorage.getItem('xv_invitados') || '[]');

        function actualizarBadgeSync() {
            const badge = document.getElementById('sync-status-badge');
            if (API_URL) {
                badge.className = 'sync-badge cloud';
                badge.innerHTML = 'Google Sheets Activo ☁️';
            } else {
                badge.className = 'sync-badge local';
                badge.innerHTML = 'Modo Local';
            }
        }

        function sincronizarYFiltrar() {
            if (!API_URL) {
                // Modo local
                renderConfirmados(invitados);
                return;
            }

            const badge = document.getElementById('sync-status-badge');
            badge.innerHTML = 'Sincronizando... <div class="sync-loader"></div>';

            fetch(API_URL)
                .then(r => {
                    if (!r.ok) throw new Error('Error al sincronizar');
                    return r.json();
                })
                .then(data => {
                    if (Array.isArray(data)) {
                        invitados = data
                            .filter(row => row.Familia && row.Familia.trim() !== '')
                            .map(row => ({
                                familia:    row.Familia,
                                pases:      parseInt(row.Pases) || 0,
                                link:       row.Link || '',
                                confirmado: row.confirmado === 'Sí ✅' || row.confirmado === 'Si ✅' || row.confirmado === 'Si' || row.confirmado === 'Sí'
                            }));
                        localStorage.setItem('xv_invitados', JSON.stringify(invitados));
                        renderConfirmados(invitados);
                        actualizarBadgeSync();
                    } else {
                        throw new Error('Invalid format');
                    }
                })
                .catch(err => {
                    console.error('Error al sincronizar en resumen:', err);
                    badge.innerHTML = 'Error de conexión ⚠️';
                    setTimeout(actualizarBadgeSync, 3000);
                    // Fallback a los datos locales si falla la red
                    renderConfirmados(invitados);
                });
        }

        function renderConfirmados(lista) {
            const cuerpo = document.getElementById('lista-cuerpo');
            cuerpo.innerHTML = '';

            const confirmados = lista.filter(i => i.confirmado);

            // Calcular totales
            const totalFamilias = confirmados.length;
            const totalPases = confirmados.reduce((acc, i) => acc + i.pases, 0);

            // Actualizar tarjetas
            document.getElementById('total-familias').innerText = totalFamilias;
            document.getElementById('total-pases').innerText = totalPases;

            if (confirmados.length === 0) {
                cuerpo.innerHTML = `<tr><td colspan="3" class="sin-datos">No hay familias confirmadas todavía. ⏳</td></tr>`;
                return;
            }

            confirmados.forEach(inv => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="nombre-familia">Familia ${inv.familia}</td>
                    <td><span class="badge-pases">${inv.pases} pase${inv.pases > 1 ? 's' : ''}</span></td>
                    <td>
                        <a href="${inv.link}" target="_blank" class="btn-ver-invitacion">Ver Invitación</a>
                    </td>
                `;
                cuerpo.appendChild(tr);
            });
        }

        // Inicializar
        actualizarBadgeSync();
        sincronizarYFiltrar();
    </script>
</body>

</html>
